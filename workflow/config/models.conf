# AI Workflow Model Configuration
# ================================
# Configure which models to use for different agent roles.
#
# Agent Roles:
#   Architect: Claude Sonnet 4.6 (orchestration, review, prompt refinement)
#   Builder:   Claude Opus 4.6 (code generation)
#   Reviewer:  Gemini (real-time code review, JSON output)
#   Screener:  Claude/Gemini (pre-commit AI analysis)
#
# Available models (as of Mar 2026):
#   Claude:  claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5
#   Google:  gemini-3.1-pro-preview, gemini-2.0-flash

# ═══════════════════════════════════════════════════════════════
# AGENT MODELS
# ═══════════════════════════════════════════════════════════════

# Architect (Claude Code in VS Code — model set by extension)
ARCHITECT_MODEL="claude-sonnet-4-6"

# Builder (Claude Code in tmux)
BUILDER_MODEL_DEFAULT="claude-opus-4-6"

# Reviewer (Gemini in tmux — real-time code review)
REVIEWER_MODEL="gemini-3.1-pro-preview"

# Screener (pre-commit AI analysis)
SCREENER_MODEL="gemini-2.0-flash"

# ═══════════════════════════════════════════════════════════════
# CODE REVIEW MODELS (used by copilot-review.sh)
# ═══════════════════════════════════════════════════════════════

# Default model for code reviews (fast, cost-effective)
REVIEW_MODEL_DEFAULT="claude-sonnet-4-6"

# Model for complex/security-sensitive reviews (deep analysis)
REVIEW_MODEL_DEEP="claude-opus-4-6"

# ═══════════════════════════════════════════════════════════════
# ESCALATION TRIGGERS
# ═══════════════════════════════════════════════════════════════

# Auto-escalate to deep model when diff exceeds this many lines
ESCALATION_LINE_THRESHOLD=100

# Auto-escalate when these patterns are detected (pipe-separated regex)
ESCALATION_SECURITY_PATTERNS="password|secret|api[_-]?key|token|credential|private[_-]?key|auth|jwt|oauth"

# Auto-escalate when complex patterns exceed this count
ESCALATION_COMPLEXITY_THRESHOLD=5

# Patterns that indicate complexity (pipe-separated)
ESCALATION_COMPLEXITY_PATTERNS="async|await|Promise|Observable|useEffect|useMemo|useCallback|useReducer"

# ═══════════════════════════════════════════════════════════════
# REVIEWER DELEGATE
# ═══════════════════════════════════════════════════════════════

# Model for pre-commit deep review (can be slower)
REVIEWER_DEEP_MODEL="gemini-3.1-pro-preview"

# Enable AI reviewer in audit-watch (true/false)
AI_AUDIT_ENABLED="true"

# Minimum seconds between AI audits of the same file
AI_AUDIT_DEBOUNCE=10

# ═══════════════════════════════════════════════════════════════
# BEHAVIOR FLAGS
# ═══════════════════════════════════════════════════════════════

# Enable auto-escalation (true/false)
AUTO_ESCALATION_ENABLED="true"

# Show model selection in output (true/false)
SHOW_MODEL_INFO="true"

# Allow interactive model selection (true/false)
INTERACTIVE_MODEL_SELECT="false"
